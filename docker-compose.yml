version: "3.9"

services:
  mongodb:
    image: mongo:7.0
    container_name: pharmacortex-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: pharmacortex
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pharmacortex-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    container_name: pharmacortex-gateway
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - MONGODB_URL=mongodb://mongodb:27017/pharmacortex
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services:/app/services

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile.celery
    container_name: pharmacortex-celery-worker
    restart: unless-stopped
    command: celery -A scheduler.tasks worker --loglevel=info --concurrency=4
    env_file:
      - .env
    environment:
      - MONGODB_URL=mongodb://mongodb:27017/pharmacortex
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services:/app/services
      - ./scheduler:/app/scheduler

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile.celery
    container_name: pharmacortex-celery-beat
    restart: unless-stopped
    command: celery -A scheduler.tasks beat --loglevel=info --scheduler celery.beat:PersistentScheduler
    env_file:
      - .env
    environment:
      - MONGODB_URL=mongodb://mongodb:27017/pharmacortex
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./scheduler:/app/scheduler

volumes:
  mongo_data:
  redis_data:
